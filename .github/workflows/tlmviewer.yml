# Build and test tlmviewer (TypeScript/Vite)

name: tlmviewer build & test

on:
    push:
        branches: ["main"]
        paths:
            - "tlmviewer/**"
            - "tlmprotocol/**"
    pull_request:
        branches: ["main"]
        paths:
            - "tlmviewer/**"
            - "tlmprotocol/**"

defaults:
    run:
        working-directory: ./tlmviewer

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          matrix:
            node-version: ["22", "24", "25"]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: tlmviewer/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Run tests
              run: npm test
