# Build and test tlmviewer (TypeScript/Vite)

name: tlmviewer build & test

on:
    push:
        branches: ["main"]
        paths:
            - "tlmviewer/**"
            - "tlmprotocol/**"
    pull_request:
        branches: ["main"]
        paths:
            - "tlmviewer/**"
            - "tlmprotocol/**"

defaults:
    run:
        working-directory: ./tlmviewer

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"
                  cache: "npm"
                  cache-dependency-path: tlmviewer/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Run tests
              run: npm test
